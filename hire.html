<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call to Action Buttons</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #a97458;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .cta-container {
      max-width: 900px;
      width: 100%;
      background: #f4e9dd;
      border-radius: 32px;
      padding: 3rem 2rem;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    .cta-title {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #111827;
    }

    .cta-description {
      font-size: 1.1rem;
      color: #4b5563;
      margin-bottom: 2.5rem;
      max-width: 550px;
      margin-left: auto;
      margin-right: auto;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.25rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.8rem;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 60px;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    /* Book a Call - Primary style */
    .btn-primary {
      background-color: #0f172a;
      color: white;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }
    .btn-primary:hover {
      background-color: #1e293b;
      transform: translateY(-2px);
    }

    /* Message Me - Outline style */
    .btn-outline {
      background-color: transparent;
      color: #0f172a;
      border: 1.5px solid #cbd5e1;
    }
    .btn-outline:hover {
      border-color: #0f172a;
      background-color: #f8fafc;
      transform: translateY(-2px);
    }

    /* Start Your Project - Accent style */
    .btn-accent {
      background-color: #2563eb;
      color: white;
      box-shadow: 0 2px 6px rgba(37, 99, 235, 0.2);
    }
    .btn-accent:hover {
      background-color: #1d4ed8;
      transform: translateY(-2px);
    }

    /* Small screens */
    @media (max-width: 640px) {
      .cta-container {
        padding: 2rem 1.5rem;
      }
      .btn {
        width: 100%;
      }
      .button-group {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="cta-container">
    <h2 class="cta-title">Let’s work together</h2>
    <p class="cta-description">
      Choose how you’d like to get in touch — whether for a quick chat, a detailed message, or kicking off a new project.
    </p>

    <div class="button-group">
      <a href="https://calendar.google.com/calendar/u/0/r/eventedit?add=adebolajames73@gmail.com" class="btn btn-primary" target="_blank">📞 Book a Call</a>
      <a href="https://wa.me/qr/U5VLPYUWEH5DC1" class="btn btn-outline" target="_blank">✉️ Message Me</a>
      <a href="https://www.upwork.com/freelancers/techjames001?mp_source=share" class="btn btn-accent" target="_blank">🚀 Start Your Project</a>
    </div>
  </div>
</body>
</html>
